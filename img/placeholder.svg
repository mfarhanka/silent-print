<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Image Placeholder</title>
  <desc id="desc">Fallback placeholder for missing images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2f7"/>
      <stop offset="100%" stop-color="#dce3ec"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g fill="#7a8797" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="400" y="230" font-size="28" font-weight="700">SilentPrint</text>
    <text x="400" y="270" font-size="20">Image Not Available</text>
  </g>
</svg>
